# SonarQube Cloud project properties — advisory mode.
# This file is read by sonarqube-scan-action during CI.
# See docs/development/sonarqube-cloud-setup.md for manual setup steps.

# Project identity
# Repository is currently aligned to the transferred VacancyPilot namespace.
# Re-verify in SonarCloud UI if scans fail after repository/org changes.
sonar.projectKey=VacancyPilot_VacancyPilot
sonar.organization=VacancyPilot

# Sources and tests
sonar.sources=entrypoints,src
sonar.tests=src,entrypoints
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclusions (generated output, dependencies, docs)
sonar.exclusions=**/node_modules/**,.output/**,dist/**,coverage/**,docs/**

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage (local, repo-controlled)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Advisory mode: do NOT wait for Quality Gate.
# When the project stabilizes (green CI for 2+ weeks, zero new code issues),
# uncomment the line below to make Sonar a blocking gate on PRs.
# sonar.qualitygate.wait=true
