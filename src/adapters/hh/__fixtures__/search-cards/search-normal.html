<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Search results — HH.ru</title></head>
<body>
<div class="search-results-page">
  <!-- Card 1: normal card with all fields -->
  <div data-qa="vacancy-serp-item" class="serp-item">
    <h3 class="serp-item__header">
      <a data-qa="serp-item__title" class="serp-item__title bloko-link" href="/vacancy/12345678?query=frontend&hhtmFrom=vacancy_search_list">
        Senior Frontend Developer (React / TypeScript)
      </a>
    </h3>
    <div class="serp-item__info">
      <a data-qa="vacancy-serp__company" class="serp-item__company bloko-link bloko-link_kind-tertiary" href="/employer/99999">
        VacancyPilot Test Company
      </a>
    </div>
    <div class="serp-item__salary-wrapper">
      <span data-qa="vacancy-serp__salary" class="serp-item__salary bloko-text bloko-text_large">
        250 000 – 350 000 ₽
      </span>
    </div>
    <div class="serp-item__meta">
      <span data-qa="vacancy-serp__city" class="serp-item__city">Москва</span>
      <span data-qa="vacancy-serp__experience" class="serp-item__experience">3–6 лет</span>
      <span data-qa="vacancy-serp__work-mode" class="serp-item__work-mode">Можно удалённо</span>
    </div>
    <div class="serp-item__footer">
      <span data-qa="vacancy-serp__publish-date">2 дня назад</span>
    </div>
  </div>
</div>
</body>
</html>
