<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g stroke="#30363d" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="320" x2="1280" y2="320" />
    <line x1="0" y1="480" x2="1280" y2="480" />
    <line x1="320" y1="0" x2="320" y2="640" />
    <line x1="640" y1="0" x2="640" y2="640" />
    <line x1="960" y1="0" x2="960" y2="640" />
  </g>

  <!-- Browser extension icon motif — simplified window with card -->
  <g transform="translate(120, 160)">
    <!-- Browser window frame -->
    <rect x="0" y="0" width="320" height="240" rx="12" fill="#21262d" stroke="#30363d" stroke-width="2" />
    <!-- Title bar -->
    <rect x="0" y="0" width="320" height="40" rx="12" fill="#161b22" />
    <rect x="0" y="20" width="320" height="20" fill="#161b22" />
    <!-- Window buttons -->
    <circle cx="20" cy="20" r="6" fill="#f85149" />
    <circle cx="42" cy="20" r="6" fill="#d29922" />
    <circle cx="64" cy="20" r="6" fill="#3fb950" />
    <!-- Extension badge icon in title bar -->
    <rect x="230" y="10" width="70" height="20" rx="10" fill="url(#accent)" opacity="0.9" />
    <text x="265" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" font-weight="700">PILOT</text>

    <!-- Card inside window -->
    <rect x="24" y="56" width="272" height="160" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1" />
    <!-- Card content lines -->
    <rect x="40" y="76" width="180" height="12" rx="4" fill="#58a6ff" opacity="0.6" />
    <rect x="40" y="100" width="240" height="8" rx="3" fill="#8b949e" opacity="0.4" />
    <rect x="40" y="118" width="200" height="8" rx="3" fill="#8b949e" opacity="0.3" />
    <rect x="40" y="136" width="160" height="8" rx="3" fill="#8b949e" opacity="0.3" />
    <!-- Score badge -->
    <rect x="40" y="162" width="56" height="28" rx="6" fill="url(#accent)" opacity="0.85" />
    <text x="68" y="181" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" font-weight="700">85</text>
    <!-- Status badge -->
    <rect x="108" y="166" width="80" height="20" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1" />
    <text x="148" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Saved</text>
  </g>

  <!-- Kanban board motif -->
  <g transform="translate(520, 160)">
    <!-- Column 1 -->
    <rect x="0" y="0" width="200" height="280" rx="8" fill="#21262d" opacity="0.6" />
    <text x="16" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" font-weight="600">Saved</text>
    <rect x="12" y="44" width="176" height="52" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" />
    <rect x="22" y="56" width="120" height="8" rx="3" fill="#58a6ff" opacity="0.5" />
    <rect x="22" y="72" width="90" height="6" rx="3" fill="#8b949e" opacity="0.3" />
    <rect x="12" y="108" width="176" height="52" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" />
    <rect x="22" y="120" width="140" height="8" rx="3" fill="#3fb950" opacity="0.5" />
    <rect x="22" y="136" width="100" height="6" rx="3" fill="#8b949e" opacity="0.3" />

    <!-- Column 2 -->
    <rect x="220" y="0" width="200" height="280" rx="8" fill="#21262d" opacity="0.6" />
    <text x="236" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" font-weight="600">Applied</text>
    <rect x="232" y="44" width="176" height="52" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" />
    <rect x="242" y="56" width="130" height="8" rx="3" fill="#d29922" opacity="0.5" />
    <rect x="242" y="72" width="80" height="6" rx="3" fill="#8b949e" opacity="0.3" />

    <!-- Column 3 -->
    <rect x="440" y="0" width="200" height="280" rx="8" fill="#21262d" opacity="0.6" />
    <text x="456" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" font-weight="600">Offer</text>
    <rect x="452" y="44" width="176" height="52" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1" />
    <rect x="462" y="56" width="110" height="8" rx="3" fill="#58a6ff" opacity="0.5" />
    <rect x="462" y="72" width="70" height="6" rx="3" fill="#8b949e" opacity="0.3" />
    <!-- Accent highlight -->
    <rect x="462" y="54" width="4" height="32" rx="2" fill="url(#accent)" />
  </g>

  <!-- Main Title -->
  <text x="120" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="56" fill="#e6edf3" font-weight="800" letter-spacing="-0.5">VacancyPilot</text>

  <!-- Accent underline -->
  <rect x="120" y="508" width="80" height="4" rx="2" fill="url(#accent)" />

  <!-- Subtitle -->
  <text x="120" y="542" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8b949e" font-weight="400">Local-first HH.ru job-search copilot</text>

  <!-- Safety line -->
  <text x="120" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#484f58" font-weight="500">
    Read-first  •  No auto-apply  •  Privacy-first
  </text>

  <!-- Small bottom-right accent -->
  <rect x="1248" y="608" width="4" height="4" rx="2" fill="url(#accent)" opacity="0.5" />
</svg>
